<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Three React</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden; background: #000;
        /* Prevent text selection, pull-to-refresh, magnifier, and overscroll on mobile */
        user-select: none; -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
        overscroll-behavior: none;
        position: fixed;
      }
      canvas { -webkit-touch-callout: none; }
      #root { width: 100vw; height: 100vh; height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
